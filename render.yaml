services:
  - type: web
    name: lexa
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SECURITY_HEADERS_ENABLED
        value: "true"
      - key: FORCE_HTTPS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lexa-db
          property: connectionString
databases:
  - name: lexa-db
    plan: starter
