services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lexa
      POSTGRES_PASSWORD: lexa
      POSTGRES_DB: lexa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexa"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://lexa:lexa@db:5432/lexa
      JWT_SECRET: ${JWT_SECRET:-change-me}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      EMBEDDINGS_BACKEND: ${EMBEDDINGS_BACKEND:-hashing}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    volumes:
      - vsdata:/app/data

volumes:
  pgdata:
  vsdata:
